repos:
  # 1. Standard pre-commit hooks for formatting and checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # 2. Modern fast linter and formatter (Ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  # 3. Custom Local Security Guardrail Scanner
  - repo: local
    hooks:
      # Block commits containing actual credentials or API keys
      - id: detect-api-keys
        name: Detect API Keys
        entry: python -c "import sys, re; pat=re.compile(r'(?:GEMINI_API_KEY|GOOGLE_API_KEY|GOOGLE_GENAI_API_KEY)\s*=\s*[A-Za-z0-9_.\"\'+-]+|AIzaSy[A-Za-z0-9_-]{35}'); errors = [f for f in sys.argv[1:] if pat.search(open(f, errors='ignore').read())]; [print(f'Security Error: Potential API key or credential exposed in: {err}') for err in errors]; sys.exit(1 if errors else 0)"
        language: system
        files: \.(py|env|json|yaml|yml|md|txt)$
        exclude: ^\.venv/

      # Explicitly prevent environment files (.env) from being committed
      - id: forbid-dotenv
        name: Forbid .env files
        entry: python -c "import sys; [print(f'Security Error: Do not commit environment file: {f}') for f in sys.argv[1:] if f.endswith('.env')]; sys.exit(1 if any(f.endswith('.env') for f in sys.argv[1:]) else 0)"
        language: system
        files: \.env$
        exclude: ^\.venv/
